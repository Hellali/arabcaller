<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>دليل الاتصال</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☎</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
// ══ EXPORT CSV ══
async function renderExport(){
  const el=document.getElementById('ac');
  el.innerHTML=`
    <div class="tab-title">تصدير قاعدة البيانات</div>
    <div class="tab-subtitle">تحميل كل جهات الاتصال كملف CSV</div>
    <div class="card" style="text-align:center;padding:3rem;">
      <div style="font-size:48px;margin-bottom:16px;">📤</div>
      <p style="font-size:15px;color:var(--text2);margin-bottom:8px;">تحميل كل قاعدة البيانات دفعة واحدة</p>
      <p style="font-size:13px;color:var(--text3);margin-bottom:24px;">يمكنك استخدام هذا الملف كنسخة احتياطية أو استيراده لاحقاً</p>
      <button class="btn btn-gold" style="padding:12px 32px;font-size:15px;" onclick="doExport()">⬇ تحميل CSV الآن</button>
      <div id="export-status" style="margin-top:16px;font-size:13px;color:var(--text3);"></div>
    </div>`;
}

async function doExport(){
  const statusEl=document.getElementById('export-status');
  if(statusEl)statusEl.textContent='جاري التحضير...';
  const{data,error}=await sb.from('contacts').select('name,phone,specialty,country,notes,added_by,added_at').order('created_at',{ascending:false});
  if(error||!data){if(statusEl)statusEl.textContent='حدث خطأ';return;}
  
  const headers=['name','phone','specialty','country','notes','added_by','added_at'];
  const rows=data.map(r=>headers.map(h=>{
    const v=r[h]||'';
    return v.includes(',')||v.includes('"')||v.includes('\n')?`"${v.replace(/"/g,'""')}"`  :v;
  }).join(','));
  const csv='\uFEFF'+headers.join(',')+String.fromCharCode(10)+rows.join(String.fromCharCode(10));
  
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='دليل_المتصلين_'+new Date().toLocaleDateString('ar-DZ').replace(/\//g,'-')+'.csv';
  a.click();
  
  await sb.rpc('log_activity',{p_admin_name:me.full_name,p_action:'تصدير CSV',p_details:'تم تصدير '+data.length+' جهة'});
  if(statusEl)statusEl.textContent=`✅ تم تصدير ${data.length} جهة بنجاح`;
}

// ══ ACTIVITY LOG ══
async function renderActivityLog(){
  const el=document.getElementById('ac');
  el.innerHTML='<div class="loading">جاري التحميل...</div>';
  const{data}=await sb.from('activity_log').select('*').order('created_at',{ascending:false}).limit(100);
  const logs=data||[];
  
  const actionColors={
    'إضافة جهة':'var(--success-text)','تعديل جهة':'var(--info-text)',
    'حذف جهة':'var(--danger-text)','استيراد CSV':'var(--gold)',
    'تصدير CSV':'var(--gold)','إضافة مستخدم':'var(--success-text)',
    'حذف مستخدم':'var(--danger-text)'
  };
  
  el.innerHTML=`
    <div class="tab-title">سجل النشاط</div>
    <div class="tab-subtitle">آخر 100 عملية في الموقع</div>
    ${logs.length===0?'<div class="empty-state"><div class="empty-icon">📜</div><p>لا يوجد نشاط بعد</p></div>':
    logs.map(l=>{
      const color=actionColors[l.action]||'var(--text2)';
      const date=new Date(l.created_at).toLocaleString('ar-DZ');
      return `<div class="contact-row" style="margin-bottom:8px;">
        <div style="width:38px;height:38px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">
          ${{
            'إضافة جهة':'➕','تعديل جهة':'✏️','حذف جهة':'🗑️',
            'استيراد CSV':'📥','تصدير CSV':'📤',
            'إضافة مستخدم':'👤','حذف مستخدم':'❌'
          }[l.action]||'📝'}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="font-weight:600;font-size:13px;color:${color};">${l.action}</span>
            <span style="font-size:11px;color:var(--text3);">بواسطة ${l.admin_name}</span>
          </div>
          ${l.details?`<div style="font-size:12px;color:var(--text3);margin-top:2px;">${l.details}</div>`:''}
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">${date}</div>
        </div>
      </div>`;
    }).join('')}`;
}

</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#c9a84c;--gold-light:#e8cc7a;--gold-dim:#c9a84c18;--gold-border:#c9a84c45;
  --gold-glow:0 0 40px #c9a84c25,0 0 80px #c9a84c10;
  /* Purple-Blue-Maroon palette */
  --purple:#7c3aed;--purple2:#6b21a8;--purple3:#4c1d95;
  --blue:#2563eb;--blue2:#1d4ed8;--blue3:#1e3a8a;
  --maroon:#be185d;--maroon2:#9d174d;--maroon3:#831843;
  /* Backgrounds */
  --bg:#0a0812;--bg2:#110d1c;--bg3:#1a1228;--bg4:#221832;
  --text:#f0ede6;--text2:#a89dc0;--text3:#5a5070;
  --border:#2a2040;--border2:#3d3060;
  --success:#1f6b3f;--success-bg:#0a2016;--success-text:#4daa78;
  --danger:#7a2020;--danger-bg:#200a0a;--danger-text:#e87070;
  --info-bg:#0a1525;--info-text:#70a0e0;--info-border:#152040;
  --radius:10px;--radius-lg:18px;
}
body{
  font-family:'Tajawal',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:15px;
}
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;z-index:0;
}
#page-login,#page-search,#page-admin{position:relative;z-index:1;}
.page{display:none;min-height:100vh;}.page.active{display:block;}

/* NAV */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(9,9,12,0.92);
  backdrop-filter:blur(24px);
  border-bottom:0.5px solid var(--border);
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 0 rgba(201,168,76,0.06),0 4px 20px rgba(0,0,0,0.3);
}
.nav-brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;}
.nav-dot{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6b21a8,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px #6b21a840;}
.nav-brand span{background:linear-gradient(90deg,#a855f7,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-actions{display:flex;align-items:center;gap:8px;}
.nav-user{font-size:13px;color:var(--text3);}

/* BUTTONS */
.btn{padding:8px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:'Tajawal',sans-serif;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  color:#fff;font-weight:700;
  box-shadow:0 2px 12px #7c3aed30;
}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px #7c3aed40;}
.btn-gold:active{transform:translateY(0);}
.btn-outline{background:transparent;border:0.5px solid var(--border2);color:var(--text2);}
.btn-outline:hover{border-color:var(--gold-border);color:var(--gold);}
.btn-ghost{background:transparent;color:var(--text3);border:none;}
.btn-ghost:hover{color:var(--text2);}
.btn-danger{background:var(--danger-bg);color:var(--danger-text);border:0.5px solid var(--danger);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-icon{width:32px;height:32px;padding:0;border-radius:8px;justify-content:center;}

/* FORMS */
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;color:var(--text3);display:block;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
.form-input{width:100%;padding:11px 16px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:'Tajawal',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;}
.form-input:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-dim);}
.form-input::placeholder{color:var(--text3);}
select.form-input option{background:var(--bg3);}
textarea.form-input{resize:vertical;min-height:80px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* CARDS */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;}
.card-gold{
  border-color:#3d3060;
  box-shadow:0 0 40px #7c3aed15,0 0 1px #7c3aed20;
  background:linear-gradient(135deg,#110d1c 0%,#130f1e 100%);
  position:relative;overflow:hidden;
}
.card-gold::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#7c3aed,var(--gold),#2563eb,#be185d);
}

/* BADGE */
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;}
.badge-success{
  background:linear-gradient(135deg,var(--success-bg),#0f2d1a);
  color:var(--success-text);border:0.5px solid var(--success);
  box-shadow:0 0 12px #1f6b3f20;
}
.badge-gold{background:#7c3aed18;color:#a855f7;border:0.5px solid #7c3aed40;}
.badge-muted{background:var(--bg4);color:var(--text3);border:0.5px solid var(--border);}

/* ALERT */
.alert{padding:10px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;}
.alert-success{background:var(--success-bg);border:0.5px solid var(--success);color:var(--success-text);}
.alert-danger{background:var(--danger-bg);border:0.5px solid var(--danger);color:var(--danger-text);}

/* AVATAR */
.avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#6b21a825,#1d4ed818);border:1px solid #7c3aed40;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#a855f7;flex-shrink:0;overflow:hidden;}
.avatar-sm{width:38px;height:38px;font-size:15px;}
.avatar-lg{width:80px;height:80px;font-size:28px;}
.avatar img{width:100%;height:100%;object-fit:cover;}

/* ═══ LOGIN ═══ */
.login-bg{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
  background:
    radial-gradient(ellipse 50% 40% at 50% -5%,#6b21a820 0%,transparent 60%),
    radial-gradient(ellipse 30% 30% at 20% 80%,#1d4ed810 0%,transparent 50%),
    radial-gradient(ellipse 25% 25% at 80% 70%,#be185d08 0%,transparent 50%),
    var(--bg);
}
.login-box{width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:2.5rem;}
.login-logo-icon{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#4c1d9525,#1e3a8a20);
  border:1px solid #7c3aed40;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:32px;
  color:var(--gold);
  box-shadow:0 0 0 8px #7c3aed08,0 0 40px #7c3aed25,0 0 80px #7c3aed10;
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{box-shadow:0 0 0 8px #7c3aed08,0 0 40px #7c3aed25,0 0 80px #7c3aed10;}
  50%{box-shadow:0 0 0 14px #7c3aed05,0 0 60px #7c3aed35,0 0 100px #7c3aed15;}
}
.login-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:16px;padding-top:14px;border-top:0.5px solid var(--border);}

/* ═══ SEARCH ═══ */
.search-hero{
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%,#6b21a820 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 100%,#1d4ed810 0%,transparent 50%),
    radial-gradient(ellipse 30% 25% at 90% 50%,#be185d08 0%,transparent 50%);
  padding:4rem 1.5rem 2.5rem;text-align:center;
  border-bottom:0.5px solid #2a204040;
}
.search-hero h2{
  font-size:32px;font-weight:800;margin-bottom:10px;
  letter-spacing:-0.5px;
}
.search-hero h2 .accent-purple{background:linear-gradient(90deg,#a855f7,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.search-hero h2{font-size:28px;font-weight:800;margin-bottom:8px;}
.search-hero h2 span{color:var(--gold);}
.search-hero p{font-size:14px;color:var(--text2);}
.search-box{max-width:600px;margin:2rem auto 0;display:flex;gap:10px;}
.search-box input{flex:1;font-size:17px;text-align:center;direction:ltr;letter-spacing:1.5px;padding:14px 20px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-lg);color:var(--text);font-family:'Tajawal',sans-serif;outline:none;transition:all .2s;}
.search-box input:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-dim);}
.search-box input::placeholder{color:var(--text3);font-size:14px;}
.search-btn{
  padding:14px 28px;
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  border:none;border-radius:var(--radius-lg);
  color:#fff;font-size:15px;font-weight:800;
  cursor:pointer;font-family:'Tajawal',sans-serif;
  transition:all .25s;white-space:nowrap;
  box-shadow:0 4px 20px #7c3aed35,0 0 0 1px #7c3aed30;
  letter-spacing:0.3px;
}
.search-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px #7c3aed50,0 0 0 1px #7c3aed50;
  filter:brightness(1.12);
}
.search-btn:active{transform:translateY(0);}
.search-result-wrap{max-width:600px;margin:1.5rem auto;padding:0 1.5rem;}
.result-card{animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.result-card{animation:fadeUp .35s cubic-bezier(0.16,1,0.3,1);}
.contact-row{animation:fadeUp .2s ease;}
.card{animation:fadeIn .25s ease;}
.result-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:0.5px solid var(--border);}
.result-name{font-size:20px;font-weight:700;}
.result-spec{font-size:13px;color:var(--gold);margin-top:3px;}
.result-table{width:100%;font-size:13px;border-collapse:collapse;}
.result-table td{padding:6px 0;vertical-align:top;}
.result-table td:first-child{color:var(--text3);width:90px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
/* Phone cell */
.phone-cell{display:flex;align-items:center;gap:8px;}
.phone-num{
  font-family:'Courier New',monospace;font-size:18px;font-weight:700;
  color:var(--gold);letter-spacing:2.5px;direction:ltr;
  text-shadow:0 0 20px #c9a84c50;
}
.copy-btn{
  padding:5px 12px;border-radius:8px;
  border:0.5px solid #7c3aed50;
  background:#7c3aed18;color:#a855f7;
  font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Tajawal',sans-serif;
  transition:all .2s;white-space:nowrap;
  letter-spacing:0.5px;
}
.copy-btn:hover{background:#7c3aed;color:#fff;transform:scale(1.05);}
.copy-btn:active{transform:scale(0.97);}
/* Not found */
.not-found-card{text-align:center;padding:2.5rem 1.5rem;}
.not-found-icon{width:56px;height:56px;border-radius:50%;background:var(--bg4);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:var(--text3);}
.ext-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;}
.ext-btn{padding:10px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;text-align:center;font-family:'Tajawal',sans-serif;transition:all .2s;text-decoration:none;display:block;}
.ext-btn:hover{transform:translateY(-2px);}
.db-count{text-align:center;font-size:12px;color:var(--text3);margin-top:16px;}

/* ═══ ADMIN ═══ */
.admin-layout{display:flex;min-height:calc(100vh - 61px);}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-left:0.5px solid var(--border);padding:1.5rem 0;}
.sidebar-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 22px;font-size:13px;font-weight:500;
  cursor:pointer;color:var(--text3);
  transition:all .2s;border-right:2px solid transparent;
  margin:1px 8px;border-radius:var(--radius);
}
.sidebar-item:hover{color:var(--text);background:var(--bg4);border-right-color:transparent;}
.sidebar-item.active{
  color:#a855f7;
  background:linear-gradient(135deg,#7c3aed14,#2563eb08);
  border-right-color:#7c3aed;
  box-shadow:inset 0 0 20px #7c3aed08;
}
.sidebar-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-sep{height:0.5px;background:var(--border);margin:12px 20px;}
.admin-content{flex:1;padding:2rem;overflow-y:auto;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:2rem;}
.stat{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:0.5px solid var(--border);
  border-radius:var(--radius-lg);padding:1.5rem;text-align:center;
  transition:border-color .2s,box-shadow .2s;
}
.stat:hover{border-color:var(--gold-border);box-shadow:0 0 20px #c9a84c10;}
.stat-num{font-size:36px;font-weight:800;background:linear-gradient(135deg,#a855f7,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.stat-label{font-size:11px;color:var(--text3);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;}
.tab-title{font-size:18px;font-weight:700;margin-bottom:6px;}
.tab-subtitle{font-size:13px;color:var(--text3);margin-bottom:1.5rem;}
.contact-row{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:8px;transition:border-color .2s;}
.contact-row:hover{border-color:var(--border2);}
.contact-info{flex:1;min-width:0;}
.contact-name{font-size:14px;font-weight:600;}
.contact-sub{font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;text-align:right;margin-top:2px;}
.contact-actions{display:flex;gap:6px;flex-shrink:0;}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:14px;}
.empty-state{text-align:center;padding:4rem 2rem;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:.4;}
.empty-state p{color:var(--text3);font-size:14px;margin-bottom:16px;}

/* FLASH */
.flash{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:var(--radius);font-size:14px;font-weight:500;animation:slideUp .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.flash-ok{background:var(--success-bg);border:0.5px solid var(--success);color:var(--success-text);}
.flash-err{background:var(--danger-bg);border:0.5px solid var(--danger);color:var(--danger-text);}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9998;display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .2s;}

.lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain;box-shadow:0 0 60px rgba(0,0,0,.8);}

<script>
const SB_URL='https://pkhxklyvceziwvsouqtf.supabase.co';
const SB_KEY='sb_publishable_bai8bydtlypGXFZn_C49GA_ryeWFPG9';
const sb=supabase.createClient(SB_URL,SB_KEY);
const STORAGE_URL=SB_URL+'/storage/v1/object/public/photos/';

async function uploadPhoto(base64orFile, folder='contacts'){
  // Convert base64 to blob if needed
  let blob;
  if(typeof base64orFile==='string'&&base64orFile.startsWith('data:')){
    const res=await fetch(base64orFile);
    blob=await res.blob();
  } else {
    blob=base64orFile;
  }
  const ext=blob.type.includes('png')?'png':'jpg';
  const fname=folder+'/'+Date.now()+'_'+Math.random().toString(36).slice(2)+'.'+ext;
  const{data,error}=await sb.storage.from('photos').upload(fname,blob,{contentType:blob.type||'image/jpeg',upsert:false});
  if(error)throw error;
  return STORAGE_URL+fname;
}

async function deletePhoto(url){
  if(!url||!url.includes('/photos/'))return;
  const path=url.split('/photos/')[1];
  await sb.storage.from('photos').remove([path]);
}

// ══ SECURITY CONFIG ══
const SESSION_TIMEOUT = 30 * 60 * 1000; // 30 دقيقة
const MAX_LOGIN_ATTEMPTS = 5;
const LOCKOUT_DURATION = 15 * 60 * 1000; // 15 دقيقة
let sessionTimer = null;
let lastActivity = Date.now();

const COUNTRIES=['الجزائر','السعودية','مصر','الإمارات','الكويت','قطر','البحرين','عمان','العراق','الأردن','لبنان','سوريا','فلسطين','ليبيا','تونس','المغرب','السودان','اليمن','الصومال','موريتانيا','أخرى'];
let me=null, editId=null, atab='contacts', _allC=[], _photoB64=null, _cropData={scale:1,x:0,y:0};

// ══ UTILS ══
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
function norm(p){return p.replace(/[\s\-\(\)\.]/g,'');}

function flash(msg,ok=true){
  const el=document.getElementById('flash-el');
  el.className='flash '+(ok?'flash-ok':'flash-err');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},3000);
}

function openLightbox(src){
  const el=document.getElementById('lightbox-el');
  el.style.display='flex';
  el.className='lightbox';
  el.innerHTML=`
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img src="${src}" onclick="event.stopPropagation()"/>`;
  el.onclick=closeLightbox;
}
function closeLightbox(){const el=document.getElementById('lightbox-el');el.style.display='none';el.innerHTML='';}

function copyPhone(phone){
  navigator.clipboard.writeText(phone).then(()=>flash('✓ تم نسخ الرقم'));
}

// ══ AUTH ══
function getLockoutKey(u){return 'lockout_'+u;}
function getAttemptsKey(u){return 'attempts_'+u;}

function checkLockout(u){
  const key=getLockoutKey(u);
  const lockTime=localStorage.getItem(key);
  if(!lockTime)return false;
  const remaining=LOCKOUT_DURATION-(Date.now()-parseInt(lockTime));
  if(remaining>0){
    const mins=Math.ceil(remaining/60000);
    return `الحساب مقفل لمدة ${mins} دقيقة بسبب محاولات دخول متعددة`;
  }
  localStorage.removeItem(key);
  localStorage.removeItem(getAttemptsKey(u));
  return false;
}

function recordFailedAttempt(u){
  const key=getAttemptsKey(u);
  const attempts=(parseInt(localStorage.getItem(key))||0)+1;
  localStorage.setItem(key,attempts);
  if(attempts>=MAX_LOGIN_ATTEMPTS){
    localStorage.setItem(getLockoutKey(u),Date.now());
    localStorage.removeItem(key);
    return `تم قفل الحساب لمدة 15 دقيقة بعد ${MAX_LOGIN_ATTEMPTS} محاولات فاشلة`;
  }
  return `بيانات الدخول غير صحيحة — المحاولة ${attempts} من ${MAX_LOGIN_ATTEMPTS}`;
}

function clearFailedAttempts(u){
  localStorage.removeItem(getAttemptsKey(u));
  localStorage.removeItem(getLockoutKey(u));
}

// ══ SESSION MANAGEMENT ══
function startSession(){
  lastActivity=Date.now();
  resetSessionTimer();
  document.addEventListener('click',onActivity);
  document.addEventListener('keydown',onActivity);
  document.addEventListener('touchstart',onActivity);
}

function onActivity(){
  lastActivity=Date.now();
  resetSessionTimer();
}

function resetSessionTimer(){
  if(sessionTimer)clearTimeout(sessionTimer);
  sessionTimer=setTimeout(()=>{
    if(me){
      showSessionExpiredMsg();
      doLogout();
    }
  },SESSION_TIMEOUT);
}

function showSessionExpiredMsg(){
  const el=document.getElementById('lerr');
  if(el){
    el.style.display='block';
    el.textContent='انتهت جلستك تلقائياً بعد 30 دقيقة من عدم النشاط';
  }
}

function stopSession(){
  if(sessionTimer)clearTimeout(sessionTimer);
  document.removeEventListener('click',onActivity);
  document.removeEventListener('keydown',onActivity);
  document.removeEventListener('touchstart',onActivity);
}

async function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  const err=document.getElementById('lerr');
  if(!u||!p){err.style.display='block';err.textContent='أدخل بيانات الدخول';return;}

  // Check lockout
  const lockMsg=checkLockout(u);
  if(lockMsg){err.style.display='block';err.textContent=lockMsg;return;}

  const h=await sha256(p);
  try{
    const{data,error}=await sb.rpc('verify_admin',{p_username:u,p_hash:h});
    if(error||!data||data.length===0){
      const msg=recordFailedAttempt(u);
      err.style.display='block';err.textContent=msg;return;
    }
    clearFailedAttempts(u);
    const loginData=data[0];
    me=loginData;
    err.style.display='none';
    document.getElementById('lu').value='';document.getElementById('lp').value='';
    // Set nav user info
    setNavUser();
    startSession();
    showPage('page-search');
    loadCount();
  }catch(e){err.style.display='block';err.textContent='خطأ في الاتصال';}
}

function setNavUser(){
  const avatar=me.photo?`<img src="${me.photo}"/>`:me.full_name.charAt(0);
  const html=`<div class="avatar avatar-sm" style="${me.photo?'':'background:var(--gold-dim);color:var(--gold);'}">${avatar}</div><span class="nav-user">${me.full_name}</span>`;
  const el1=document.getElementById('nav-user-info');
  const el2=document.getElementById('nav-user-info2');
  if(el1)el1.innerHTML=html;
  if(el2)el2.innerHTML=html;
  // show admin btn only for admin/superadmin
  const adminBtn=document.getElementById('btn-admin');
  if(adminBtn)adminBtn.style.display=(me.role==='admin'||me.role==='superadmin')?'inline-flex':'none';
}

function doLogout(){
  stopSession();
  me=null;editId=null;atab='contacts';_allC=[];
  showPage('page-login');
}

// ══ SMART SEARCH ══
function isPhoneQuery(q){return /^[\d\+\s\-\(\)\.]+$/.test(q)&&q.replace(/\D/g,'').length>=4;}

function clearSearch(){
  document.getElementById('sp').value='';
  document.getElementById('country-filter').value='';
  document.getElementById('sr').innerHTML='';
  document.getElementById('dbc').textContent='';
  loadCount();
}

async function doSearch(){
  const raw=document.getElementById('sp').value.trim();
  const countryFilter=document.getElementById('country-filter')?.value||'';
  if(!raw&&!countryFilter)return;
  const el=document.getElementById('sr');
  el.innerHTML='<div class="loading">جاري البحث...</div>';
  try{
    let data=[];
    if(raw&&isPhoneQuery(raw)){
      // Phone search
      const n=norm(raw);
      let q=sb.from('contacts').select('*');
      if(countryFilter)q=q.eq('country',countryFilter);
      const{data:all}=await q;
      const f=(all||[]).find(c=>{const cn=norm(c.phone);return cn===n||cn.endsWith(n)||n.endsWith(cn);});
      if(f)data=[f];
    } else if(raw){
      // Text search with optional country filter
      const q=raw.trim();
      let q1=sb.from('contacts').select('*').ilike('name','%'+q+'%');
      let q2=sb.from('contacts').select('*').ilike('specialty','%'+q+'%');
      let q3=sb.from('contacts').select('*').ilike('notes','%'+q+'%');
      if(countryFilter){q1=q1.eq('country',countryFilter);q2=q2.eq('country',countryFilter);q3=q3.eq('country',countryFilter);}
      const[r1,r2,r3]=await Promise.all([q1,q2,q3]);
      const seen=new Set();
      for(const r of[r1,r2,r3]){
        for(const c of(r.data||[])){
          if(!seen.has(c.id)){seen.add(c.id);data.push(c);}
        }
      }
    } else if(countryFilter){
      // Country only filter
      const{data:all}=await sb.from('contacts').select('*').eq('country',countryFilter);
      data=all||[];
    }
    const f=data.length===1?data[0]:null;
    const multi=data.length>1?data:null;
    if(f){
      el.innerHTML=renderSingleResult(f);
    } else if(multi){
      el.innerHTML=renderMultiResults(multi,raw);
    } else {
      const enc=encodeURIComponent(raw);
      const isPhone=isPhoneQuery(raw);
      el.innerHTML=`
        <div class="card not-found-card result-card">
          <div class="not-found-icon">🔍</div>
          <h3 style="font-size:16px;font-weight:600;margin-bottom:8px;">${isPhone?'الرقم غير موجود في قاعدة البيانات':'لا توجد نتائج مطابقة'}</h3>
          <p style="font-size:13px;color:var(--text3);margin-bottom:20px;">${isPhone?'ابحث في المنصات الخارجية':'جرّب كلمة أخرى أو ابحث في الإنترنت'}</p>
          ${isPhone?`<div class="ext-grid">
            <a href="https://www.google.com/search?q=${enc}" target="_blank" class="ext-btn" style="background:#0d1a30;color:#60a5fa;border:0.5px solid #1d4ed840;">🌐 Google</a>
            <a href="https://www.truecaller.com/search/dz/${enc.replace(/%2B/g,'')}" target="_blank" class="ext-btn" style="background:#0a2016;color:#4daa78;border:0.5px solid #1f6b3f40;">📞 Truecaller</a>
            <a href="https://wa.me/${enc.replace(/%2B/g,'')}" target="_blank" class="ext-btn" style="background:#0a1a0a;color:#4daa78;border:0.5px solid #1f6b3f30;">💬 WhatsApp</a>
            <a href="https://www.google.com/maps/search/${enc}" target="_blank" class="ext-btn" style="background:#1a0d28;color:#a855f7;border:0.5px solid #6b21a840;">📍 Maps</a>
          </div>`:''}
        </div>`;
    }
  }catch(e){el.innerHTML='<div class="alert alert-danger">خطأ في الاتصال بقاعدة البيانات</div>';}
}

function renderSingleResult(f){
  const photoHtml=f.photo
    ?`<div class="avatar" style="width:60px;height:60px;cursor:zoom-in;border:2px solid var(--gold-border);" onclick="openLightbox('${f.photo}')"><img src="${f.photo}" style="width:100%;height:100%;object-fit:cover;"/></div>`
    :`<div class="avatar" style="width:60px;height:60px;font-size:22px;">${f.name.charAt(0)}</div>`;
  return `<div class="card card-gold result-card">
    <div class="result-header">
      ${photoHtml}
      <div style="flex:1"><div class="result-name">${f.name}</div>${f.specialty?`<div class="result-spec">${f.specialty}</div>`:''}</div>
      <span class="badge badge-success">موجود ✓</span>
    </div>
    <table class="result-table">
      <tr><td>الهاتف</td><td><div class="phone-cell"><span class="phone-num">${f.phone}</span><button class="copy-btn" onclick="copyPhone('${f.phone}')">نسخ</button></div></td></tr>
      ${f.country?`<tr><td>الدولة</td><td style="color:var(--text)">${f.country}</td></tr>`:''}
      ${f.notes?`<tr><td>ملاحظات</td><td style="color:var(--text2)">${f.notes}</td></tr>`:''}
      ${f.added_by?`<tr><td>أضافه</td><td style="color:var(--text3);font-size:12px;">${f.added_by} · ${f.added_at||''}</td></tr>`:''}
    </table>
    ${f.photo?`<div style="margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border);font-size:12px;color:var(--text3);">💡 انقر على الصورة لعرضها بالحجم الكامل</div>`:''}
  </div>`;
}

function renderMultiResults(list, query){
  const cards=list.map(f=>`
    <div class="contact-row" style="cursor:pointer;margin-bottom:8px;" onclick="expandResult('${f.id}')">
      <div class="avatar avatar-sm">${f.photo?`<img src="${f.photo}"/>`:(f.name?f.name.charAt(0):'?')}</div>
      <div class="contact-info">
        <div class="contact-name">${f.name}</div>
        <div class="contact-sub">${f.phone}${f.specialty?' · '+f.specialty:''}${f.country?' · '+f.country:''}</div>
      </div>
      <span style="font-size:12px;color:var(--text3);">عرض ←</span>
    </div>`).join('');
  window._multiResults=list;
  return `<div class="result-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div><span class="badge badge-gold">${list.length} نتيجة</span></div>
      <div style="font-size:13px;color:var(--text3);">نتائج البحث عن: <strong style="color:var(--text)">${query}</strong></div>
    </div>
    <div id="multi-list">${cards}</div>
    <div id="expanded-result"></div>
  </div>`;
}

function expandResult(id){
  const f=window._multiResults.find(r=>r.id===id);
  if(!f)return;
  const el=document.getElementById('expanded-result');
  if(el){el.innerHTML='<div style="margin-top:16px;padding-top:16px;border-top:0.5px solid var(--border);">'+renderSingleResult(f)+'</div>';
  el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

async function loadCount(){
  const{count}=await sb.from('contacts').select('*',{count:'exact',head:true});
  const el=document.getElementById('dbc');
  if(el)el.textContent=count?`${count} جهة اتصال في القاعدة`:'';
}

// ── CROP LOGIC ──
let _cropImg=null;
function loadCropImage(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>3*1024*1024){flash('حجم الصورة أكبر من 3MB',false);return;}
  const reader=new FileReader();
  reader.onload=e=>{
    _cropData={scale:1,x:0,y:0};
    const img=document.getElementById('crop-img');
    const ph=document.getElementById('crop-placeholder');
    img.src=e.target.result;
    img.style.display='block';
    if(ph)ph.style.display='none';
    img.onload=()=>{
      const wrap=document.getElementById('crop-wrap');
      const ww=wrap.offsetWidth,wh=wrap.offsetHeight;
      const iw=img.naturalWidth,ih=img.naturalHeight;
      const fit=Math.max(ww/iw,wh/ih);
      _cropData.scale=fit;
      _cropData.x=(ww-iw*fit)/2;
      _cropData.y=(wh-ih*fit)/2;
      document.getElementById('zoom-slider').min=fit;
      document.getElementById('zoom-slider').value=fit;
      applyCrop();
    };
    document.getElementById('crop-controls').style.display='flex';
    document.getElementById('remove-photo-btn').style.display='inline-flex';
  };
  reader.readAsDataURL(file);
}

function onZoom(val){
  const wrap=document.getElementById('crop-wrap');
  const img=document.getElementById('crop-img');
  if(!img)return;
  const oldScale=_cropData.scale;
  const newScale=parseFloat(val);
  const cx=wrap.offsetWidth/2,cy=wrap.offsetHeight/2;
  _cropData.x=cx-(_cropData.x===0?cx:_cropData.x+img.naturalWidth*oldScale/2)*(newScale/oldScale)+img.naturalWidth*newScale/2-img.naturalWidth*newScale/2;
  _cropData.x=cx-(cx-_cropData.x)*(newScale/oldScale);
  _cropData.y=cy-(cy-_cropData.y)*(newScale/oldScale);
  _cropData.scale=newScale;
  applyCrop();
}

function applyCrop(){
  const img=document.getElementById('crop-img');
  if(!img)return;
  img.style.transform=`translate(${_cropData.x}px,${_cropData.y}px) scale(${_cropData.scale})`;
  img.style.left='0';img.style.top='0';img.style.transformOrigin='0 0';
}

function initCropDrag(){
  const wrap=document.getElementById('crop-wrap');
  if(!wrap)return;
  let dragging=false,startX,startY,startCX,startCY;
  wrap.addEventListener('mousedown',e=>{
    if(document.getElementById('crop-img').style.display==='none')return;
    dragging=true;startX=e.clientX;startY=e.clientY;
    startCX=_cropData.x;startCY=_cropData.y;e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    _cropData.x=startCX+(e.clientX-startX);
    _cropData.y=startCY+(e.clientY-startY);
    applyCrop();
  });
  window.addEventListener('mouseup',()=>{dragging=false;});
  // Touch
  wrap.addEventListener('touchstart',e=>{
    if(document.getElementById('crop-img').style.display==='none')return;
    dragging=true;startX=e.touches[0].clientX;startY=e.touches[0].clientY;
    startCX=_cropData.x;startCY=_cropData.y;
  });
  window.addEventListener('touchmove',e=>{
    if(!dragging)return;
    _cropData.x=startCX+(e.touches[0].clientX-startX);
    _cropData.y=startCY+(e.touches[0].clientY-startY);
    applyCrop();
  });
  window.addEventListener('touchend',()=>{dragging=false;});
}

function removeCropPhoto(){
  _photoB64=null;_cropData={scale:1,x:0,y:0};
  const img=document.getElementById('crop-img');
  const ph=document.getElementById('crop-placeholder');
  if(img){img.src='';img.style.display='none';}
  if(ph)ph.style.display='flex';
  document.getElementById('crop-controls').style.display='none';
  document.getElementById('remove-photo-btn').style.display='none';
  document.getElementById('cf-photo-inp').value='';
}

function cropToBase64(){
  const img=document.getElementById('crop-img');
  if(!img||img.style.display==='none')return Promise.resolve(null);
  return new Promise(resolve=>{
    const wrap=document.getElementById('crop-wrap');
    const size=wrap.offsetWidth;
    const canvas=document.createElement('canvas');
    canvas.width=size;canvas.height=size;
    const ctx=canvas.getContext('2d');
    ctx.save();
    ctx.beginPath();ctx.arc(size/2,size/2,size/2,0,Math.PI*2);ctx.clip();
    ctx.drawImage(img,_cropData.x,_cropData.y,img.naturalWidth*_cropData.scale,img.naturalHeight*_cropData.scale);
    ctx.restore();
    resolve(canvas.toDataURL('image/jpeg',0.85));
  });
}

async function saveContact(){
  const name=document.getElementById('cf-name').value.trim();
  const phone=document.getElementById('cf-phone').value.trim();
  if(!name||!phone){flash('الاسم والرقم مطلوبان',false);return;}
  
  // Get cropped image as base64
  let photoUrl=_photoB64||null; // keep existing URL if no new image
  const newCrop=await cropToBase64();
  if(newCrop){
    try{
      flash('جاري رفع الصورة...');
      photoUrl=await uploadPhoto(newCrop,'contacts');
    }catch(e){flash('خطأ في رفع الصورة: '+e.message,false);return;}
  }
  
  const payload={name,phone,
    specialty:document.getElementById('cf-spec').value.trim(),
    country:document.getElementById('cf-country').value,
    notes:document.getElementById('cf-notes').value.trim(),
    added_by:me.full_name,
    added_at:new Date().toLocaleDateString('ar-DZ'),
    photo:photoUrl
  };
  let err;
  if(editId){
    const{error:e}=await sb.rpc('update_contact',{
      p_id:editId,p_name:payload.name,p_phone:payload.phone,
      p_specialty:payload.specialty,p_country:payload.country,
      p_notes:payload.notes,p_added_by:payload.added_by,
      p_added_at:payload.added_at,p_photo:payload.photo
    });err=e;
  }else{
    const{error:e}=await sb.rpc('add_contact',{
      p_name:payload.name,p_phone:payload.phone,
      p_specialty:payload.specialty,p_country:payload.country,
      p_notes:payload.notes,p_added_by:payload.added_by,
      p_added_at:payload.added_at,p_photo:payload.photo
    });err=e;
  }
  if(err){flash('حدث خطأ: '+err.message,false);return;}
  flash(editId?'تم التعديل بنجاح ✓':'تمت الإضافة بنجاح ✓');
  await sb.rpc('log_activity',{p_admin_name:me.full_name,p_action:editId?'تعديل جهة':'إضافة جهة',p_details:payload.name+' · '+payload.phone});
  editId=null;_allC=[];_photoB64=null;
  setTimeout(()=>switchTab('contacts'),1000);
}

function downloadTemplate(){
  const csv="name,phone,specialty,country,notes\nأحمد بن علي,+213661234567,باحث سياسي,الجزائر,جامعة وهران";
  const blob=new Blob(["\uFEFF"+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='نموذج.csv';a.click();
}
function handleDrop(e){const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFileSelect(i){if(i.files[0])processFile(i.files[0]);}
function processFile(file){const r=new FileReader();r.onload=e=>parseCSV(e.target.result);r.readAsText(file,'UTF-8');}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2){document.getElementById('import-preview').innerHTML='<div class="alert alert-danger">الملف فارغ</div>';return;}
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const ni=headers.findIndex(h=>h==='name'||h==='الاسم');
  const pi=headers.findIndex(h=>h==='phone'||h==='هاتف'||h==='الهاتف');
  if(ni<0||pi<0){document.getElementById('import-preview').innerHTML='<div class="alert alert-danger">لم يُعثر على عمودَي name و phone</div>';return;}
  const si=headers.findIndex(h=>h==='specialty');
  const ci=headers.findIndex(h=>h==='country');
  const noi=headers.findIndex(h=>h==='notes');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const cols=lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const name=cols[ni]||'';const phone=cols[pi]||'';
    if(!name||!phone)continue;
    rows.push({name,phone,specialty:si>=0?cols[si]||'':'',country:ci>=0?cols[ci]||'الجزائر':'الجزائر',notes:noi>=0?cols[noi]||'':'',added_by:me.full_name,added_at:new Date().toLocaleDateString('ar-DZ')});
  }
  if(!rows.length){document.getElementById('import-preview').innerHTML='<div class="alert alert-danger">لا توجد صفوف صالحة</div>';return;}
  window._importRows=rows;
  const prev=rows.slice(0,5).map(r=>`<div style="padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;"><strong>${r.name}</strong> · <span style="direction:ltr;font-family:monospace;color:var(--gold-light);">${r.phone}</span></div>`).join('');
  document.getElementById('import-preview').innerHTML=`
    <div class="alert alert-success">✓ تم قراءة ${rows.length} جهة اتصال</div>
    <div style="background:var(--bg);border-radius:10px;padding:0 14px;margin-bottom:14px;">${prev}</div>
    ${rows.length>5?`<div style="font-size:12px;color:var(--text3);margin-bottom:14px;">... و ${rows.length-5} سجل آخر</div>`:''}
    <div style="display:flex;gap:10px;">
      <button class="btn btn-gold" style="padding:10px 24px;" onclick="confirmImport()">✅ تأكيد استيراد ${rows.length} جهة</button>
      <button class="btn btn-outline" onclick="renderImport()">إلغاء</button>
    </div>`;
}

async function confirmImport(){
  const rows=window._importRows;if(!rows||!rows.length)return;
  const btn=event.target;btn.textContent='جاري الاستيراد...';btn.disabled=true;
  let total=0;
  for(let i=0;i<rows.length;i+=50){
    const batch=rows.slice(i,i+50);
    const{error}=await sb.rpc('bulk_insert_contacts',{p_contacts:JSON.stringify(batch)});
    if(error){flash('خطأ: '+error.message,false);btn.disabled=false;return;}
    total+=Math.min(50,rows.length-i);
    btn.textContent=`تم ${total} من ${rows.length}...`;
  }
  window._importRows=[];_allC=[];
  await sb.rpc('log_activity',{p_admin_name:me.full_name,p_action:'استيراد CSV',p_details:'تم استيراد '+total+' جهة'});
  flash(`✅ تم استيراد ${total} جهة بنجاح!`);
  setTimeout(()=>switchTab('contacts'),1500);
}

          <div id="u-photo-prev" class="avatar avatar-lg" style="cursor:pointer;" onclick="document.getElementById('u-photo-inp').click()">👤</div>
          <div>
            <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('u-photo-inp').click()">📁 رفع صورة</button>
            <input type="file" id="u-photo-inp" accept="image/*" style="display:none;" onchange="previewUserPhoto(this)"/>
            <p style="font-size:12px;color:var(--text3);margin-top:6px;">تظهر في واجهة تسجيل الدخول</p>
          </div>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">الاسم الكامل *</label>
          <input class="form-input" id="uf-name" placeholder="اسم المستخدم"/>
        </div>
        <div class="form-group">
          <label class="form-label">اسم الدخول *</label>
          <input class="form-input" id="uf-user" placeholder="username" dir="ltr"/>
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور *</label>
          <input type="password" class="form-input" id="uf-pass" placeholder="كلمة مرور قوية"/>
        </div>
        <div class="form-group">
          <label class="form-label">الصلاحية</label>
          <select class="form-input" id="uf-role">
            <option value="user">مستخدم (بحث فقط)</option>
            <option value="admin">مدير</option>
            <option value="superadmin">مدير رئيسي</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">تعريف مختصر (اختياري)</label>
        <input class="form-input" id="uf-bio" placeholder="مثال: محرر القناة - قسم السياسة"/>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-gold" style="padding:10px 24px;" onclick="saveUser()">إضافة مستخدم</button>
        <button class="btn btn-outline" onclick="switchTab('users')">إلغاء</button>
      </div>
    </div>`;
  _userPhotoB64=null;
}

let _userPhotoB64=null;
function previewUserPhoto(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    _userPhotoB64=e.target.result;
    const prev=document.getElementById('u-photo-prev');
    if(prev)prev.innerHTML=`<img src="${_userPhotoB64}"/>`;
  };
  r.readAsDataURL(file);
}

async function saveUser(){
  const name=document.getElementById('uf-name').value.trim();
  const username=document.getElementById('uf-user').value.trim();
  const pass=document.getElementById('uf-pass').value.trim();
  const role=document.getElementById('uf-role').value;
  const bio=document.getElementById('uf-bio').value.trim();
  if(!name||!username||!pass){flash('الاسم واسم الدخول وكلمة المرور مطلوبة',false);return;}
  const h=await sha256(pass);
  let userPhotoUrl=null;
  if(_userPhotoB64){
    try{userPhotoUrl=await uploadPhoto(_userPhotoB64,'users');}catch(e){flash('خطأ في رفع الصورة',false);return;}
  }
  const{error}=await sb.rpc('add_admin',{p_username:username,p_password_hash:h,p_full_name:name,p_role:role,p_bio:bio,p_photo:userPhotoUrl});
  if(error){flash(error.code==='23505'?'اسم الدخول مستخدم مسبقاً':'خطأ: '+error.message,false);return;}
  flash('تمت إضافة المستخدم ✓');
  await sb.rpc('log_activity',{p_admin_name:me.full_name,p_action:'إضافة مستخدم',p_details:name+' ('+role+')'});
  _userPhotoB64=null;
  setTimeout(()=>switchTab('users'),1000);
}

async function delUser(id){
  if(!confirm('حذف هذا المستخدم؟'))return;
  await sb.rpc('delete_admin',{p_id:id});
  await sb.rpc('log_activity',{p_admin_name:me.full_name,p_action:'حذف مستخدم',p_details:'ID: '+id});
  flash('تم الحذف');await renderUsers();
}

function renderSettings(){
  const el=document.getElementById('ac');
  el.innerHTML=`
    <div class="tab-title">⚙️ إعداداتي</div>
    <div class="tab-subtitle">تعديل معلوماتك الشخصية وبيانات الدخول</div>
    <div class="card">

      <div class="settings-section">
        <h3>الصورة الشخصية</h3>
        <div style="display:flex;align-items:center;gap:16px;">
          <div id="s-photo-prev" class="avatar avatar-lg" style="cursor:pointer;" onclick="document.getElementById('s-photo-inp').click()">
            ${me.photo?`<img src="${me.photo}"/>`:me.full_name.charAt(0)}
          </div>
          <div>
            <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('s-photo-inp').click()">📁 تغيير الصورة</button>
            <input type="file" id="s-photo-inp" accept="image/*" style="display:none;" onchange="previewSettingsPhoto(this)"/>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h3>المعلومات الشخصية</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">الاسم الكامل</label>
            <input class="form-input" id="s-name" value="${me.full_name||''}"/>
          </div>
          <div class="form-group">
            <label class="form-label">اسم الدخول</label>
            <input class="form-input" id="s-user" value="${me.username||''}" dir="ltr"/>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h3>تغيير كلمة المرور</h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">كلمة المرور الجديدة</label>
            <input type="password" class="form-input" id="s-pass" placeholder="اتركه فارغاً إن لم تريد التغيير"/>
          </div>
          <div class="form-group">
            <label class="form-label">تأكيد كلمة المرور</label>
            <input type="password" class="form-input" id="s-pass2" placeholder="أعد كتابة كلمة المرور"/>
          </div>
        </div>
      </div>

      <button class="btn btn-gold" style="padding:10px 28px;" onclick="saveSettings()">حفظ التغييرات</button>
    </div>`;
  _settingsPhotoB64=null;
}

let _settingsPhotoB64=null;
function previewSettingsPhoto(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    _settingsPhotoB64=e.target.result;
    const prev=document.getElementById('s-photo-prev');
    if(prev)prev.innerHTML=`<img src="${_settingsPhotoB64}"/>`;
  };
  r.readAsDataURL(file);
}

async function saveSettings(){
  const name=document.getElementById('s-name').value.trim();
  const username=document.getElementById('s-user').value.trim();
  const pass=document.getElementById('s-pass').value.trim();
  const pass2=document.getElementById('s-pass2').value.trim();
  if(!name||!username){flash('الاسم واسم الدخول مطلوبان',false);return;}
  if(pass&&pass!==pass2){flash('كلمتا المرور غير متطابقتين',false);return;}
  const payload={full_name:name,username};
  if(pass)payload.password_hash=await sha256(pass);
  if(_settingsPhotoB64){
    try{payload.photo=await uploadPhoto(_settingsPhotoB64,'users');}
    catch(e){flash('خطأ في رفع الصورة',false);return;}
  }
  const{error}=await sb.rpc('update_admin_settings',{
    p_id:me.id,p_full_name:payload.full_name,p_username:payload.username,
    p_password_hash:payload.password_hash||null,
    p_photo:payload.photo||null
  });
  if(error){flash('خطأ: '+error.message,false);return;}
  me={...me,...payload};
  if(_settingsPhotoB64)me.photo=_settingsPhotoB64;
  setNavUser();
  flash('تم حفظ التغييرات ✓');
  _settingsPhotoB64=null;
}

// ══ EXPORT CSV ══
async function renderExport(){
  const el=document.getElementById('ac');
  el.innerHTML=`
    <div class="tab-title">تصدير قاعدة البيانات</div>
    <div class="tab-subtitle">تحميل كل جهات الاتصال كملف CSV</div>
    <div class="card" style="text-align:center;padding:3rem;">
      <div style="font-size:48px;margin-bottom:16px;">📤</div>
      <p style="font-size:15px;color:var(--text2);margin-bottom:8px;">تحميل كل قاعدة البيانات دفعة واحدة</p>
      <p style="font-size:13px;color:var(--text3);margin-bottom:24px;">يمكنك استخدام هذا الملف كنسخة احتياطية أو استيراده لاحقاً</p>
      <button class="btn btn-gold" style="padding:12px 32px;font-size:15px;" onclick="doExport()">⬇ تحميل CSV الآن</button>
      <div id="export-status" style="margin-top:16px;font-size:13px;color:var(--text3);"></div>
    </div>`;
}

async function doExport(){
  const statusEl=document.getElementById('export-status');
  if(statusEl)statusEl.textContent='جاري التحضير...';
  const{data,error}=await sb.from('contacts').select('name,phone,specialty,country,notes,added_by,added_at').order('created_at',{ascending:false});
  if(error||!data){if(statusEl)statusEl.textContent='حدث خطأ';return;}
  
  const headers=['name','phone','specialty','country','notes','added_by','added_at'];
  const rows=data.map(r=>headers.map(h=>{
    const v=r[h]||'';
    return v.includes(',')||v.includes('"')||v.includes('\n')?`"${v.replace(/"/g,'""')}"`  :v;
  }).join(','));
  const csv='\uFEFF'+headers.join(',')+String.fromCharCode(10)+rows.join(String.fromCharCode(10));
  
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='دليل_المتصلين_'+new Date().toLocaleDateString('ar-DZ').replace(/\//g,'-')+'.csv';
  a.click();
  
  await sb.rpc('log_activity',{p_admin_name:me.full_name,p_action:'تصدير CSV',p_details:'تم تصدير '+data.length+' جهة'});
  if(statusEl)statusEl.textContent=`✅ تم تصدير ${data.length} جهة بنجاح`;
}

// ══ ACTIVITY LOG ══
async function renderActivityLog(){
  const el=document.getElementById('ac');
  el.innerHTML='<div class="loading">جاري التحميل...</div>';
  const{data}=await sb.from('activity_log').select('*').order('created_at',{ascending:false}).limit(100);
  const logs=data||[];
  
  const actionColors={
    'إضافة جهة':'var(--success-text)','تعديل جهة':'var(--info-text)',
    'حذف جهة':'var(--danger-text)','استيراد CSV':'var(--gold)',
    'تصدير CSV':'var(--gold)','إضافة مستخدم':'var(--success-text)',
    'حذف مستخدم':'var(--danger-text)'
  };
  
  el.innerHTML=`
    <div class="tab-title">سجل النشاط</div>
    <div class="tab-subtitle">آخر 100 عملية في الموقع</div>
    ${logs.length===0?'<div class="empty-state"><div class="empty-icon">📜</div><p>لا يوجد نشاط بعد</p></div>':
    logs.map(l=>{
      const color=actionColors[l.action]||'var(--text2)';
      const date=new Date(l.created_at).toLocaleString('ar-DZ');
      return `<div class="contact-row" style="margin-bottom:8px;">
        <div style="width:38px;height:38px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">
          ${{
            'إضافة جهة':'➕','تعديل جهة':'✏️','حذف جهة':'🗑️',
            'استيراد CSV':'📥','تصدير CSV':'📤',
            'إضافة مستخدم':'👤','حذف مستخدم':'❌'
          }[l.action]||'📝'}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="font-weight:600;font-size:13px;color:${color};">${l.action}</span>
            <span style="font-size:11px;color:var(--text3);">بواسطة ${l.admin_name}</span>
          </div>
          ${l.details?`<div style="font-size:12px;color:var(--text3);margin-top:2px;">${l.details}</div>`:''}
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">${date}</div>
        </div>
      </div>`;
    }).join('')}`;
}
