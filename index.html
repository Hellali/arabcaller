<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>دليل المتصلين</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☎</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#c9a84c;--gold-light:#e8cc7a;--gold-dim:#c9a84c22;--gold-border:#c9a84c55;
  --bg:#0d0d0f;--bg2:#141418;--bg3:#1a1a20;--bg4:#222228;
  --text:#f0ede6;--text2:#a8a499;--text3:#5a5850;
  --border:#2a2a32;--border2:#383840;
  --success:#2a7a4a;--success-bg:#0d2a1a;--success-text:#5dba8a;
  --danger:#8a2a2a;--danger-bg:#2a0d0d;--danger-text:#f08080;
  --info-bg:#0d1a2a;--info-text:#80b0f0;--info-border:#1a4a7a;
  --radius:10px;--radius-lg:16px;
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
.page{display:none;min-height:100vh;}.page.active{display:block;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(13,13,15,.95);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;}
.nav-dot{width:32px;height:32px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-size:16px;}
.nav-brand span{color:var(--gold);}
.nav-actions{display:flex;align-items:center;gap:8px;}
.nav-user{font-size:13px;color:var(--text3);}

/* BUTTONS */
.btn{padding:8px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:'Tajawal',sans-serif;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0d0d0f;}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-outline{background:transparent;border:0.5px solid var(--border2);color:var(--text2);}
.btn-outline:hover{border-color:var(--gold-border);color:var(--gold);}
.btn-ghost{background:transparent;color:var(--text3);border:none;}
.btn-ghost:hover{color:var(--text2);}
.btn-danger{background:var(--danger-bg);color:var(--danger-text);border:0.5px solid var(--danger);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-icon{width:32px;height:32px;padding:0;border-radius:8px;justify-content:center;}

/* FORMS */
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;color:var(--text3);display:block;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
.form-input{width:100%;padding:11px 16px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:'Tajawal',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;}
.form-input:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-dim);}
.form-input::placeholder{color:var(--text3);}
select.form-input option{background:var(--bg3);}
textarea.form-input{resize:vertical;min-height:80px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* CARDS */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;}
.card-gold{border-color:var(--gold-border);box-shadow:0 0 30px var(--gold-dim);}

/* BADGE */
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;}
.badge-success{background:var(--success-bg);color:var(--success-text);border:0.5px solid var(--success);}
.badge-gold{background:var(--gold-dim);color:var(--gold);border:0.5px solid var(--gold-border);}
.badge-muted{background:var(--bg4);color:var(--text3);border:0.5px solid var(--border);}

/* ALERT */
.alert{padding:10px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;}
.alert-success{background:var(--success-bg);border:0.5px solid var(--success);color:var(--success-text);}
.alert-danger{background:var(--danger-bg);border:0.5px solid var(--danger);color:var(--danger-text);}

/* AVATAR */
.avatar{width:46px;height:46px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--gold);flex-shrink:0;overflow:hidden;}
.avatar-sm{width:38px;height:38px;font-size:15px;}
.avatar-lg{width:80px;height:80px;font-size:28px;}
.avatar img{width:100%;height:100%;object-fit:cover;}

/* ═══ LOGIN ═══ */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse 60% 50% at 50% 0%,#c9a84c14 0%,transparent 70%),var(--bg);}
.login-box{width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:2.5rem;}
.login-logo-icon{width:72px;height:72px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px;box-shadow:0 0 40px var(--gold-dim);}
.login-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:16px;padding-top:14px;border-top:0.5px solid var(--border);}

/* ═══ SEARCH ═══ */
.search-hero{background:radial-gradient(ellipse 80% 60% at 50% -10%,#c9a84c12 0%,transparent 65%);padding:3rem 1.5rem 2rem;text-align:center;}
.search-hero h2{font-size:28px;font-weight:800;margin-bottom:8px;}
.search-hero h2 span{color:var(--gold);}
.search-hero p{font-size:14px;color:var(--text2);}
.search-box{max-width:600px;margin:2rem auto 0;display:flex;gap:10px;}
.search-box input{flex:1;font-size:17px;text-align:center;direction:ltr;letter-spacing:1.5px;padding:14px 20px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-lg);color:var(--text);font-family:'Tajawal',sans-serif;outline:none;transition:all .2s;}
.search-box input:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-dim);}
.search-box input::placeholder{color:var(--text3);font-size:14px;}
.search-btn{padding:14px 26px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;border-radius:var(--radius-lg);color:#0d0d0f;font-size:15px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;white-space:nowrap;}
.search-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.search-result-wrap{max-width:600px;margin:1.5rem auto;padding:0 1.5rem;}
.result-card{animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.result-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:0.5px solid var(--border);}
.result-name{font-size:20px;font-weight:700;}
.result-spec{font-size:13px;color:var(--gold);margin-top:3px;}
.result-table{width:100%;font-size:13px;border-collapse:collapse;}
.result-table td{padding:6px 0;vertical-align:top;}
.result-table td:first-child{color:var(--text3);width:90px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
/* Phone cell */
.phone-cell{display:flex;align-items:center;gap:8px;}
.phone-num{font-family:'Courier New',monospace;font-size:17px;font-weight:700;color:var(--gold-light);letter-spacing:2px;direction:ltr;}
.copy-btn{padding:4px 10px;border-radius:6px;border:0.5px solid var(--gold-border);background:var(--gold-dim);color:var(--gold);font-size:11px;font-weight:600;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;white-space:nowrap;}
.copy-btn:hover{background:var(--gold);color:#0d0d0f;}
/* Not found */
.not-found-card{text-align:center;padding:2.5rem 1.5rem;}
.not-found-icon{width:56px;height:56px;border-radius:50%;background:var(--bg4);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:var(--text3);}
.ext-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;}
.ext-btn{padding:10px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;text-align:center;font-family:'Tajawal',sans-serif;transition:all .2s;text-decoration:none;display:block;}
.ext-btn:hover{transform:translateY(-2px);}
.db-count{text-align:center;font-size:12px;color:var(--text3);margin-top:16px;}

/* ═══ ADMIN ═══ */
.admin-layout{display:flex;min-height:calc(100vh - 61px);}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-left:0.5px solid var(--border);padding:1.5rem 0;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;border-right:3px solid transparent;}
.sidebar-item:hover{color:var(--text);background:var(--bg3);}
.sidebar-item.active{color:var(--gold);background:var(--gold-dim);border-right-color:var(--gold);}
.sidebar-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-sep{height:0.5px;background:var(--border);margin:12px 20px;}
.admin-content{flex:1;padding:2rem;overflow-y:auto;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:2rem;}
.stat{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center;}
.stat-num{font-size:32px;font-weight:800;color:var(--gold);}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.tab-title{font-size:18px;font-weight:700;margin-bottom:6px;}
.tab-subtitle{font-size:13px;color:var(--text3);margin-bottom:1.5rem;}
.contact-row{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:8px;transition:border-color .2s;}
.contact-row:hover{border-color:var(--border2);}
.contact-info{flex:1;min-width:0;}
.contact-name{font-size:14px;font-weight:600;}
.contact-sub{font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;text-align:right;margin-top:2px;}
.contact-actions{display:flex;gap:6px;flex-shrink:0;}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:14px;}
.empty-state{text-align:center;padding:4rem 2rem;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:.4;}
.empty-state p{color:var(--text3);font-size:14px;margin-bottom:16px;}

/* FLASH */
.flash{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:var(--radius);font-size:14px;font-weight:500;animation:slideUp .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.flash-ok{background:var(--success-bg);border:0.5px solid var(--success);color:var(--success-text);}
.flash-err{background:var(--danger-bg);border:0.5px solid var(--danger);color:var(--danger-text);}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9998;display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain;box-shadow:0 0 60px rgba(0,0,0,.8);}
.lightbox-close{position:fixed;top:20px;left:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* IMAGE CROP TOOL */
.crop-wrap{position:relative;width:200px;height:200px;border-radius:50%;overflow:hidden;border:2px solid var(--gold-border);background:var(--bg);cursor:move;flex-shrink:0;margin:0 auto;}
.crop-img{position:absolute;transform-origin:center center;user-select:none;pointer-events:none;}
.crop-controls{display:flex;align-items:center;gap:10px;margin-top:12px;justify-content:center;}
.crop-controls input[type=range]{width:140px;accent-color:var(--gold);}
.crop-controls label{font-size:12px;color:var(--text3);}

/* USER CARD in admin */
.user-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.user-role-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}

/* PROFILE / SETTINGS */
.settings-section{margin-bottom:24px;}
.settings-section h3{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:14px;padding-bottom:8px;border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.5px;}

@media(max-width:640px){
  .sidebar{display:none;}
  .form-grid{grid-template-columns:1fr;}
  .search-box{flex-direction:column;}
  .admin-content{padding:1rem;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="page-login" class="page active">
<div class="login-bg">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">☎</div>
      <h1 style="font-size:26px;font-weight:800;">دليل المتصلين</h1>
      <p style="font-size:13px;color:var(--text3);margin-top:6px;">النظام الخاص بفريق الإعلام</p>
    </div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">اسم المستخدم</label>
        <input id="lu" class="form-input" placeholder="أدخل اسم المستخدم" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="form-label">كلمة المرور</label>
        <input id="lp" type="password" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div id="lerr" class="alert alert-danger" style="display:none;"></div>
      <button class="btn btn-gold" style="width:100%;padding:12px;font-size:15px;" onclick="doLogin()">دخول</button>
    </div>
  </div>
</div>
</div>

<!-- SEARCH -->
<div id="page-search" class="page">
  <nav class="nav">
    <div class="nav-brand"><div class="nav-dot">☎</div>دليل <span>المتصلين</span></div>
    <div class="nav-actions">
      <div id="nav-user-info" style="display:flex;align-items:center;gap:8px;"></div>
      <button id="btn-admin" class="btn btn-outline btn-sm" onclick="showAdmin()" style="display:none;">⚙ الإدارة</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">خروج</button>
    </div>
  </nav>
  <div class="search-hero">
    <h2>ابحث عن <span>صاحب الرقم</span></h2>
    <p>ابحث برقم الهاتف أو الاسم أو التخصص أو أي كلمة من معلومات الشخص</p>
    <div class="search-box">
      <input id="sp" type="tel" placeholder="رقم هاتف أو اسم أو تخصص..." onkeydown="if(event.key==='Enter')doSearch()"/>
      <button class="search-btn" onclick="doSearch()">بحث</button>
    </div>
  </div>
  <div class="search-result-wrap">
    <div id="sr"></div>
    <div id="dbc" class="db-count"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="page-admin" class="page">
  <nav class="nav">
    <div class="nav-brand"><div class="nav-dot">☎</div>دليل <span>المتصلين</span></div>
    <div class="nav-actions">
      <div id="nav-user-info2" style="display:flex;align-items:center;gap:8px;"></div>
      <button class="btn btn-outline btn-sm" onclick="showPage('page-search')">البحث</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">خروج</button>
    </div>
  </nav>
  <div class="admin-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="admin-content" id="ac"></div>
  </div>
</div>

<div id="flash-el" style="display:none;"></div>
<div id="lightbox-el" style="display:none;"></div>

<script>
const SB_URL='https://pkhxklyvceziwvsouqtf.supabase.co';
const SB_KEY='sb_publishable_bai8bydtlypGXFZn_C49GA_ryeWFPG9';
const sb=supabase.createClient(SB_URL,SB_KEY);
const STORAGE_URL=SB_URL+'/storage/v1/object/public/photos/';

async function uploadPhoto(base64orFile, folder='contacts'){
  // Convert base64 to blob if needed
  let blob;
  if(typeof base64orFile==='string'&&base64orFile.startsWith('data:')){
    const res=await fetch(base64orFile);
    blob=await res.blob();
  } else {
    blob=base64orFile;
  }
  const ext=blob.type.includes('png')?'png':'jpg';
  const fname=folder+'/'+Date.now()+'_'+Math.random().toString(36).slice(2)+'.'+ext;
  const{data,error}=await sb.storage.from('photos').upload(fname,blob,{contentType:blob.type||'image/jpeg',upsert:false});
  if(error)throw error;
  return STORAGE_URL+fname;
}

async function deletePhoto(url){
  if(!url||!url.includes('/photos/'))return;
  const path=url.split('/photos/')[1];
  await sb.storage.from('photos').remove([path]);
}

const COUNTRIES=['الجزائر','السعودية','مصر','الإمارات','الكويت','قطر','البحرين','عمان','العراق','الأردن','لبنان','سوريا','فلسطين','ليبيا','تونس','المغرب','السودان','اليمن','الصومال','موريتانيا','أخرى'];
let me=null, editId=null, atab='contacts', _allC=[], _photoB64=null, _cropData={scale:1,x:0,y:0};

// ══ UTILS ══
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
function norm(p){return p.replace(/[\s\-\(\)\.]/g,'');}

function flash(msg,ok=true){
  const el=document.getElementById('flash-el');
  el.className='flash '+(ok?'flash-ok':'flash-err');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},3000);
}

function openLightbox(src){
  const el=document.getElementById('lightbox-el');
  el.style.display='flex';
  el.className='lightbox';
  el.innerHTML=`
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img src="${src}" onclick="event.stopPropagation()"/>`;
  el.onclick=closeLightbox;
}
function closeLightbox(){const el=document.getElementById('lightbox-el');el.style.display='none';el.innerHTML='';}

function copyPhone(phone){
  navigator.clipboard.writeText(phone).then(()=>flash('✓ تم نسخ الرقم'));
}

// ══ AUTH ══
async function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  const err=document.getElementById('lerr');
  if(!u||!p){err.style.display='block';err.textContent='أدخل بيانات الدخول';return;}
  const h=await sha256(p);
  try{
    const{data,error}=await sb.from('admins').select('*').eq('username',u).eq('password_hash',h).single();
    if(error||!data){err.style.display='block';err.textContent='بيانات الدخول غير صحيحة';return;}
    me=data;
    err.style.display='none';
    document.getElementById('lu').value='';document.getElementById('lp').value='';
    // Set nav user info
    setNavUser();
    showPage('page-search');
    loadCount();
  }catch(e){err.style.display='block';err.textContent='خطأ في الاتصال';}
}

function setNavUser(){
  const avatar=me.photo?`<img src="${me.photo}"/>`:me.full_name.charAt(0);
  const html=`<div class="avatar avatar-sm" style="${me.photo?'':'background:var(--gold-dim);color:var(--gold);'}">${avatar}</div><span class="nav-user">${me.full_name}</span>`;
  const el1=document.getElementById('nav-user-info');
  const el2=document.getElementById('nav-user-info2');
  if(el1)el1.innerHTML=html;
  if(el2)el2.innerHTML=html;
  // show admin btn only for admin/superadmin
  const adminBtn=document.getElementById('btn-admin');
  if(adminBtn)adminBtn.style.display=(me.role==='admin'||me.role==='superadmin')?'inline-flex':'none';
}

function doLogout(){me=null;editId=null;atab='contacts';_allC=[];showPage('page-login');}

// ══ SMART SEARCH ══
function isPhoneQuery(q){return /^[\d\+\s\-\(\)\.]+$/.test(q)&&q.replace(/\D/g,'').length>=4;}

async function doSearch(){
  const raw=document.getElementById('sp').value.trim();
  if(!raw)return;
  const el=document.getElementById('sr');
  el.innerHTML='<div class="loading">جاري البحث...</div>';
  try{
    let data=[];
    if(isPhoneQuery(raw)){
      // Phone search: fetch all and match normalized
      const n=norm(raw);
      const{data:all}=await sb.from('contacts').select('*');
      const f=(all||[]).find(c=>{const cn=norm(c.phone);return cn===n||cn.endsWith(n)||n.endsWith(cn);});
      if(f)data=[f];
    } else {
      // Text search: server-side ilike across name, specialty, notes
      const q=raw.trim();
      const[r1,r2,r3]=await Promise.all([
        sb.from('contacts').select('*').ilike('name','%'+q+'%'),
        sb.from('contacts').select('*').ilike('specialty','%'+q+'%'),
        sb.from('contacts').select('*').ilike('notes','%'+q+'%')
      ]);
      const seen=new Set();
      for(const r of[r1,r2,r3]){
        for(const c of(r.data||[])){
          if(!seen.has(c.id)){seen.add(c.id);data.push(c);}
        }
      }
    }
    const f=data.length===1?data[0]:null;
    const multi=data.length>1?data:null;
    if(f){
      el.innerHTML=renderSingleResult(f);
    } else if(multi){
      el.innerHTML=renderMultiResults(multi,raw);
    } else {
      const enc=encodeURIComponent(raw);
      const isPhone=isPhoneQuery(raw);
      el.innerHTML=`
        <div class="card not-found-card result-card">
          <div class="not-found-icon">🔍</div>
          <h3 style="font-size:16px;font-weight:600;margin-bottom:8px;">${isPhone?'الرقم غير موجود في قاعدة البيانات':'لا توجد نتائج مطابقة'}</h3>
          <p style="font-size:13px;color:var(--text3);margin-bottom:20px;">${isPhone?'ابحث في المنصات الخارجية':'جرّب كلمة أخرى أو ابحث في الإنترنت'}</p>
          ${isPhone?`<div class="ext-grid">
            <a href="https://www.google.com/search?q=${enc}" target="_blank" class="ext-btn" style="background:#1a2a3a;color:#7ab4e8;border:0.5px solid #2a4a6a;">🌐 Google</a>
            <a href="https://www.truecaller.com/search/dz/${enc.replace(/%2B/g,'')}" target="_blank" class="ext-btn" style="background:#1a3a2a;color:#7ae8a4;border:0.5px solid #2a6a4a;">📞 Truecaller</a>
            <a href="https://wa.me/${enc.replace(/%2B/g,'')}" target="_blank" class="ext-btn" style="background:#1a3a1a;color:#7ae87a;border:0.5px solid #2a6a2a;">💬 WhatsApp</a>
            <a href="https://www.google.com/maps/search/${enc}" target="_blank" class="ext-btn" style="background:#3a2a1a;color:#e8c47a;border:0.5px solid #6a4a2a;">📍 Maps</a>
          </div>`:''}
        </div>`;
    }
  }catch(e){el.innerHTML='<div class="alert alert-danger">خطأ في الاتصال بقاعدة البيانات</div>';}
}

// ── CROP LOGIC ──
let _cropImg=null;
function loadCropImage(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>3*1024*1024){flash('حجم الصورة أكبر من 3MB',false);return;}
  const reader=new FileReader();
  reader.onload=e=>{
    _cropData={scale:1,x:0,y:0};
    const img=document.getElementById('crop-img');
    const ph=document.getElementById('crop-placeholder');
    img.src=e.target.result;
    img.style.display='block';
    if(ph)ph.style.display='none';
    img.onload=()=>{
      const wrap=document.getElementById('crop-wrap');
      const ww=wrap.offsetWidth,wh=wrap.offsetHeight;
      const iw=img.naturalWidth,ih=img.naturalHeight;
      const fit=Math.max(ww/iw,wh/ih);
      _cropData.scale=fit;
      _cropData.x=(ww-iw*fit)/2;
      _cropData.y=(wh-ih*fit)/2;
      document.getElementById('zoom-slider').min=fit;
      document.getElementById('zoom-slider').value=fit;
      applyCrop();
    };
    document.getElementById('crop-controls').style.display='flex';
    document.getElementById('remove-photo-btn').style.display='inline-flex';
  };
  reader.readAsDataURL(file);
}

function onZoom(val){
  const wrap=document.getElementById('crop-wrap');
  const img=document.getElementById('crop-img');
  if(!img)return;
  const oldScale=_cropData.scale;
  const newScale=parseFloat(val);
  const cx=wrap.offsetWidth/2,cy=wrap.offsetHeight/2;
  _cropData.x=cx-(_cropData.x===0?cx:_cropData.x+img.naturalWidth*oldScale/2)*(newScale/oldScale)+img.naturalWidth*newScale/2-img.naturalWidth*newScale/2;
  _cropData.x=cx-(cx-_cropData.x)*(newScale/oldScale);
  _cropData.y=cy-(cy-_cropData.y)*(newScale/oldScale);
  _cropData.scale=newScale;
  applyCrop();
}

function applyCrop(){
  const img=document.getElementById('crop-img');
  if(!img)return;
  img.style.transform=`translate(${_cropData.x}px,${_cropData.y}px) scale(${_cropData.scale})`;
  img.style.left='0';img.style.top='0';img.style.transformOrigin='0 0';
}

function initCropDrag(){
  const wrap=document.getElementById('crop-wrap');
  if(!wrap)return;
  let dragging=false,startX,startY,startCX,startCY;
  wrap.addEventListener('mousedown',e=>{
    if(document.getElementById('crop-img').style.display==='none')return;
    dragging=true;startX=e.clientX;startY=e.clientY;
    startCX=_cropData.x;startCY=_cropData.y;e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    _cropData.x=startCX+(e.clientX-startX);
    _cropData.y=startCY+(e.clientY-startY);
    applyCrop();
  });
  window.addEventListener('mouseup',()=>{dragging=false;});
  // Touch
  wrap.addEventListener('touchstart',e=>{
    if(document.getElementById('crop-img').style.display==='none')return;
    dragging=true;startX=e.touches[0].clientX;startY=e.touches[0].clientY;
    startCX=_cropData.x;startCY=_cropData.y;
  });
  window.addEventListener('touchmove',e=>{
    if(!dragging)return;
    _cropData.x=startCX+(e.touches[0].clientX-startX);
    _cropData.y=startCY+(e.touches[0].clientY-startY);
    applyCrop();
  });
  window.addEventListener('touchend',()=>{dragging=false;});
}

function removeCropPhoto(){
  _photoB64=null;_cropData={scale:1,x:0,y:0};
  const img=document.getElementById('crop-img');
  const ph=document.getElementById('crop-placeholder');
  if(img){img.src='';img.style.display='none';}
  if(ph)ph.style.display='flex';
  document.getElementById('crop-controls').style.display='none';
  document.getElementById('remove-photo-btn').style.display='none';
  document.getElementById('cf-photo-inp').value='';
}

function cropToBase64(){
  const img=document.getElementById('crop-img');
  if(!img||img.style.display==='none')return Promise.resolve(null);
  return new Promise(resolve=>{
    const wrap=document.getElementById('crop-wrap');
    const size=wrap.offsetWidth;
    const canvas=document.createElement('canvas');
    canvas.width=size;canvas.height=size;
    const ctx=canvas.getContext('2d');
    ctx.save();
    ctx.beginPath();ctx.arc(size/2,size/2,size/2,0,Math.PI*2);ctx.clip();
    ctx.drawImage(img,_cropData.x,_cropData.y,img.naturalWidth*_cropData.scale,img.naturalHeight*_cropData.scale);
    ctx.restore();
    resolve(canvas.toDataURL('image/jpeg',0.85));
  });
}

        onclick="document.getElementById('csv-file').click()"
        ondragover="event.preventDefault();this.style.borderColor='var(--gold)';"
        ondragleave="this.style.borderColor='var(--gold-border)';"
        ondrop="event.preventDefault();this.style.borderColor='var(--gold-border)';handleDrop(event);">
        <div style="font-size:36px;margin-bottom:10px;">📂</div>
        <div style="font-weight:600;margin-bottom:6px;">اسحب الملف هنا أو انقر للاختيار</div>
        <div style="font-size:12px;color:var(--text3);">يدعم ملفات CSV</div>
        <input type="file" id="csv-file" accept=".csv,.txt" style="display:none;" onchange="handleFileSelect(this)"/>
      </div>
      <div id="import-preview" style="margin-top:16px;"></div>
    </div>`;
}

function downloadTemplate(){
  const csv="name,phone,specialty,country,notes\nأحمد بن علي,+213661234567,باحث سياسي,الجزائر,جامعة وهران";
  const blob=new Blob(["\uFEFF"+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='نموذج.csv';a.click();
}
function handleDrop(e){const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFileSelect(i){if(i.files[0])processFile(i.files[0]);}
function processFile(file){const r=new FileReader();r.onload=e=>parseCSV(e.target.result);r.readAsText(file,'UTF-8');}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2){document.getElementById('import-preview').innerHTML='<div class="alert alert-danger">الملف فارغ</div>';return;}
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const ni=headers.findIndex(h=>h==='name'||h==='الاسم');
  const pi=headers.findIndex(h=>h==='phone'||h==='هاتف'||h==='الهاتف');
  if(ni<0||pi<0){document.getElementById('import-preview').innerHTML='<div class="alert alert-danger">لم يُعثر على عمودَي name و phone</div>';return;}
  const si=headers.findIndex(h=>h==='specialty');
  const ci=headers.findIndex(h=>h==='country');
  const noi=headers.findIndex(h=>h==='notes');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const cols=lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const name=cols[ni]||'';const phone=cols[pi]||'';
    if(!name||!phone)continue;
    rows.push({name,phone,specialty:si>=0?cols[si]||'':'',country:ci>=0?cols[ci]||'الجزائر':'الجزائر',notes:noi>=0?cols[noi]||'':'',added_by:me.full_name,added_at:new Date().toLocaleDateString('ar-DZ')});
  }
  if(!rows.length){document.getElementById('import-preview').innerHTML='<div class="alert alert-danger">لا توجد صفوف صالحة</div>';return;}
  window._importRows=rows;
  const prev=rows.slice(0,5).map(r=>`<div style="padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;"><strong>${r.name}</strong> · <span style="direction:ltr;font-family:monospace;color:var(--gold-light);">${r.phone}</span></div>`).join('');
  document.getElementById('import-preview').innerHTML=`
    <div class="alert alert-success">✓ تم قراءة ${rows.length} جهة اتصال</div>
    <div style="background:var(--bg);border-radius:10px;padding:0 14px;margin-bottom:14px;">${prev}</div>
    ${rows.length>5?`<div style="font-size:12px;color:var(--text3);margin-bottom:14px;">... و ${rows.length-5} سجل آخر</div>`:''}
    <div style="display:flex;gap:10px;">
      <button class="btn btn-gold" style="padding:10px 24px;" onclick="confirmImport()">✅ تأكيد استيراد ${rows.length} جهة</button>
      <button class="btn btn-outline" onclick="renderImport()">إلغاء</button>
    </div>`;
}

async function confirmImport(){
  const rows=window._importRows;if(!rows||!rows.length)return;
  const btn=event.target;btn.textContent='جاري الاستيراد...';btn.disabled=true;
  let total=0;
  for(let i=0;i<rows.length;i+=50){
    const{error}=await sb.from('contacts').insert(rows.slice(i,i+50));
    if(error){flash('خطأ: '+error.message,false);btn.disabled=false;return;}
    total+=Math.min(50,rows.length-i);
    btn.textContent=`تم ${total} من ${rows.length}...`;
  }
  window._importRows=[];_allC=[];
  flash(`✅ تم استيراد ${total} جهة بنجاح!`);
  setTimeout(()=>switchTab('contacts'),1500);
}

let _userPhotoB64=null;
function previewUserPhoto(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    _userPhotoB64=e.target.result;
    const prev=document.getElementById('u-photo-prev');
    if(prev)prev.innerHTML=`<img src="${_userPhotoB64}"/>`;
  };
  r.readAsDataURL(file);
}

async function saveUser(){
  const name=document.getElementById('uf-name').value.trim();
  const username=document.getElementById('uf-user').value.trim();
  const pass=document.getElementById('uf-pass').value.trim();
  const role=document.getElementById('uf-role').value;
  const bio=document.getElementById('uf-bio').value.trim();
  if(!name||!username||!pass){flash('الاسم واسم الدخول وكلمة المرور مطلوبة',false);return;}
  const h=await sha256(pass);
  let userPhotoUrl=null;
  if(_userPhotoB64){
    try{userPhotoUrl=await uploadPhoto(_userPhotoB64,'users');}catch(e){flash('خطأ في رفع الصورة',false);return;}
  }
  const{error}=await sb.from('admins').insert([{username,password_hash:h,full_name:name,role,bio,photo:userPhotoUrl}]);
  if(error){flash(error.code==='23505'?'اسم الدخول مستخدم مسبقاً':'خطأ: '+error.message,false);return;}
  flash('تمت إضافة المستخدم ✓');
  _userPhotoB64=null;
  setTimeout(()=>switchTab('users'),1000);
}

async function delUser(id){
  if(!confirm('حذف هذا المستخدم؟'))return;
  await sb.from('admins').delete().eq('id',id);
  flash('تم الحذف');await renderUsers();
}

        <h3>المعلومات الشخصية</h3>

          </div>
          <div class="form-group">

            <input type="password" class="form-input" id="s-pass2" placeholder="أعد كتابة كلمة المرور"/>

let _settingsPhotoB64=null;
function previewSettingsPhoto(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    _settingsPhotoB64=e.target.result;
    const prev=document.getElementById('s-photo-prev');
    if(prev)prev.innerHTML=`<img src="${_settingsPhotoB64}"/>`;
  };
  r.readAsDataURL(file);
}

async function saveSettings(){
  const name=document.getElementById('s-name').value.trim();
  const username=document.getElementById('s-user').value.trim();
  const pass=document.getElementById('s-pass').value.trim();
  const pass2=document.getElementById('s-pass2').value.trim();
  if(!name||!username){flash('الاسم واسم الدخول مطلوبان',false);return;}
  if(pass&&pass!==pass2){flash('كلمتا المرور غير متطابقتين',false);return;}
  const payload={full_name:name,username};
  if(pass)payload.password_hash=await sha256(pass);
  if(_settingsPhotoB64){
    try{payload.photo=await uploadPhoto(_settingsPhotoB64,'users');}
    catch(e){flash('خطأ في رفع الصورة',false);return;}
  }
  const{error}=await sb.from('admins').update(payload).eq('id',me.id);
  if(error){flash('خطأ: '+error.message,false);return;}
  me={...me,...payload};
  if(_settingsPhotoB64)me.photo=_settingsPhotoB64;
  setNavUser();
  flash('تم حفظ التغييرات ✓');
  _settingsPhotoB64=null;
}
